<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: #0d1117;
      color: #e6e9ef;
      font-family: system-ui, sans-serif;
      user-select: none;
    }
    .spinner {
      width: 34px; height: 34px;
      border: 3px solid #2a3242;
      border-top-color: #4f8ef7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 15px; font-weight: 600; margin: 0; }
    p { font-size: 12.5px; color: #9aa4b2; margin: 0; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h1>First-time setup</h1>
  <p>Installing the Python analysis engine — this happens once and takes a minute.</p>
</body>
</html>
